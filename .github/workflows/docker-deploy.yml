name: Docker CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: betterspend-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_TAG: sha-${{ github.sha }}
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @betterspend/shared build

      - name: Build database package
        run: pnpm --filter @betterspend/db build

      - name: Typecheck API
        run: pnpm --filter @betterspend/api typecheck

      - name: Typecheck web
        run: pnpm --filter @betterspend/web exec tsc --noEmit --incremental false

      - name: Build API
        run: pnpm --filter @betterspend/api build

      - name: Build web
        run: pnpm --filter @betterspend/web build

      - name: Validate Compose files
        run: |
          docker compose config >/dev/null
          cp .env.production.example deploy/.env.production
          IMAGE_TAG=sha-ci docker compose --env-file deploy/.env.production -f deploy/docker-compose.prod.yml config >/dev/null

      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t betterspend-api:ci .

      - name: Build web image
        run: docker build --build-arg NEXT_PUBLIC_API_URL=https://example.com -f docker/web.Dockerfile -t betterspend-web:ci .

      - name: Build migrator image
        run: docker build -f docker/migrator.Dockerfile -t betterspend-migrator:ci .

  publish:
    name: Publish Images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure image settings
        id: image_settings
        env:
          GHCR_IMAGE_NAMESPACE: ${{ vars.GHCR_IMAGE_NAMESPACE }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          namespace="${GHCR_IMAGE_NAMESPACE:-$REPOSITORY_OWNER}"
          namespace="$(printf '%s' "$namespace" | tr '[:upper:]' '[:lower:]')"
          test -n "$namespace"
          web_api_url="${NEXT_PUBLIC_API_URL:-http://localhost:4001}"
          {
            printf 'api_tag=%s/%s/betterspend-api:%s\n' "$REGISTRY" "$namespace" "$IMAGE_TAG"
            printf 'web_tag=%s/%s/betterspend-web:%s\n' "$REGISTRY" "$namespace" "$IMAGE_TAG"
            printf 'migrator_tag=%s/%s/betterspend-migrator:%s\n' "$REGISTRY" "$namespace" "$IMAGE_TAG"
            printf 'web_api_url=%s\n' "$web_api_url"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image_settings.outputs.api_tag }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.image_settings.outputs.web_api_url }}
          tags: ${{ steps.image_settings.outputs.web_tag }}

      - name: Build and push migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/migrator.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image_settings.outputs.migrator_tag }}
